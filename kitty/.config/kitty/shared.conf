# Shared Kitty config for Linux and macOS.

# Use fish consistently on both platforms and start it as a login shell so it
# reads the expected startup files when Kitty is launched from a GUI session.
shell fish --login --interactive
shell_integration enabled
tab_bar_edge top

# Catppuccin Mocha
foreground #CDD6F4
background #1E1E2E
selection_foreground #CDD6F4
selection_background #585B70

cursor #F5E0DC
cursor_text_color #1E1E2E

color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8
