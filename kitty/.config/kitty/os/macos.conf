# Tint the titlebar to the terminal background for a more cohesive Kitty look.
font_size 14.0
macos_titlebar_color background
macos_option_as_alt both

# Browser-style tab switching on macOS.
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Let AeroSpace shortcuts keep working while Kitty has focus.
map alt+h launch --type=background /opt/homebrew/bin/aerospace focus left
map alt+j launch --type=background /opt/homebrew/bin/aerospace focus down
map alt+k launch --type=background /opt/homebrew/bin/aerospace focus up
map alt+l launch --type=background /opt/homebrew/bin/aerospace focus right
map alt+1 launch --type=background /opt/homebrew/bin/aerospace workspace 1
map alt+2 launch --type=background /opt/homebrew/bin/aerospace workspace 2
map alt+3 launch --type=background /opt/homebrew/bin/aerospace workspace 3
map alt+4 launch --type=background /opt/homebrew/bin/aerospace workspace 4
map alt+5 launch --type=background /opt/homebrew/bin/aerospace workspace 5
map alt+6 launch --type=background /opt/homebrew/bin/aerospace workspace 6
map alt+7 launch --type=background /opt/homebrew/bin/aerospace workspace 7
map alt+8 launch --type=background /opt/homebrew/bin/aerospace workspace 8
map alt+9 launch --type=background /opt/homebrew/bin/aerospace workspace 9
map alt+0 launch --type=background /opt/homebrew/bin/aerospace workspace 10
map alt+shift+1 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 1
map alt+shift+2 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 2
map alt+shift+3 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 3
map alt+shift+4 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 4
map alt+shift+5 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 5
map alt+shift+6 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 6
map alt+shift+7 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 7
map alt+shift+8 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 8
map alt+shift+9 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 9
map alt+shift+0 launch --type=background /opt/homebrew/bin/aerospace move-node-to-workspace 10

# Use Kitty's native macOS keybindings instead of overriding Ctrl+N,
# which would conflict with common shell/readline navigation.
