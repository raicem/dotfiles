# Linux needs an explicit font because the current monospace fallback on this
# machine resolves to Nimbus Mono PS, which renders worse than JetBrains Mono.
font_family JetBrainsMono Nerd Font Mono
font_size 13.0

# Match the themed background when client-side decorations are in use.
wayland_titlebar_color background

# Mirror the macOS tab shortcuts with a Linux-friendly modifier.
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
