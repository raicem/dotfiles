# Kitty config for macOS, ported from the Ghostty setup in this repo.

# Match the Ghostty command setting and make sure fish starts as an
# interactive login shell on macOS so it reads the expected startup files.
shell fish --login --interactive
shell_integration enabled
font_size 14.0

# Keep standard window chrome, but tint the titlebar to the terminal
# background so the window feels closer to Ghostty's Catppuccin theme.
hide_window_decorations no
macos_titlebar_color background
tab_bar_edge top

# Catppuccin Mocha
foreground #CDD6F4
background #1E1E2E
selection_foreground #CDD6F4
selection_background #585B70

cursor #F5E0DC
cursor_text_color #1E1E2E

color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# Browser-style tab switching on macOS.
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Use Kitty's native macOS keybindings instead of porting Ghostty's Ctrl+N,
# which would conflict with common shell/readline navigation.
